[project]
name = "epistemic-math"
version = "1.0.0"
description = "Formal computational-epistemology engine for Epis-KG: Bayesian belief, epistemic decay, and misinformation-hub centrality."
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "networkx>=3.3",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["epistemic_math"]
