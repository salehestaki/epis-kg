[project]
name = "evaluation"
version = "1.0.0"
description = "Empirical evaluation & hyperparameter tuning for Epis-KG: ground-truth benchmarking against the LIAR dataset and Bayesian optimisation of the decay weights."
requires-python = ">=3.11"
dependencies = [
    "scikit-learn>=1.4",
    "scipy>=1.13",
    "numpy>=1.26",
    "optuna>=3.6",
    "pydantic>=2.7",
    "graph-schema",
    "epistemic-math",
    "agentic-reasoning",
    "observability",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evaluation"]
