[project]
name = "graph-schema"
version = "1.0.0"
description = "Epis-KG epistemic ontology: Pydantic domain models and the neo4j-graphrag GraphSchema."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["graph_schema"]
