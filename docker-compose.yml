# ---------------------------------------------------------------------------
# Epis-KG full stack. Bring everything up with:  docker compose up --build
# Layers (see README): infrastructure -> ingestion -> reasoning -> api -> ui
# ---------------------------------------------------------------------------
name: epis-kg

x-python-env: &python-env
  NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
  NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-please-change-me}
  NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  INGESTION_STREAM: ${INGESTION_STREAM:-epis-kg:ingest}
  REASONING_GROUP: ${REASONING_GROUP:-epis-kg-reasoners}
  LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
  LLM_MODEL: ${LLM_MODEL:-claude-opus-4-8}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.gapgpt.app/v1}
  EPIS_REASONING_PARAMS: ${EPIS_REASONING_PARAMS:-true}
  EPIS_CONSENSUS_MODE: ${EPIS_CONSENSUS_MODE:-false}
  EPIS_CONSENSUS_PROVIDER_B: ${EPIS_CONSENSUS_PROVIDER_B:-openai}
  EPIS_CONSENSUS_MODEL_B: ${EPIS_CONSENSUS_MODEL_B:-gpt-4o-mini}
  EPIS_LLM_CACHE: ${EPIS_LLM_CACHE:-true}
  LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
  LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
  LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-epis-kg}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  EPIS_ALPHA: ${EPIS_ALPHA:-0.5}
  EPIS_BETA: ${EPIS_BETA:-0.35}
  EPIS_GAMMA: ${EPIS_GAMMA:-0.15}
  EPIS_LAMBDA: ${EPIS_LAMBDA:-0.05}

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: epis-kg-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/please-change-me}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_pagecache_size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: epis-kg-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Optional offline LLM. Only needed when LLM_PROVIDER=ollama.
  ollama:
    image: ollama/ollama:latest
    container_name: epis-kg-ollama
    profiles: ["offline"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ingestion_service:
    build:
      context: .
      dockerfile: services/ingestion_service/Dockerfile
    container_name: epis-kg-ingestion
    environment:
      <<: *python-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  agentic_reasoning:
    build:
      context: .
      dockerfile: services/agentic_reasoning/Dockerfile
    container_name: epis-kg-reasoning
    environment:
      <<: *python-env
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: epis-kg-api
    environment:
      <<: *python-env
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: epis-kg-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/graph}
    ports:
      - "3000:3000"
    depends_on:
      - api_gateway
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  ollama_data:
